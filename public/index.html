<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NETWORK://TRACER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --void: #0a0a12;
    --panel: #12121a;
    --panel-border: #2a2a3d;
    --pink: #ff2079;
    --cyan: #05f7ff;
    --yellow: #e8ff2e;
    --red: #ff2d3d;
    --text: #eef0f5;
    --muted: #6b6f8a;
    --clip: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--void);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    position: relative;
    overflow-x: hidden;
  }

  /* ambient scanline / CRT texture — quiet, not distracting */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.015) 0px,
      rgba(255,255,255,0.015) 1px,
      transparent 1px,
      transparent 3px
    );
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 998;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }

  header {
    padding: 28px 24px 18px;
    border-bottom: 1px solid var(--panel-border);
    position: relative;
  }
  header h1 {
    margin: 0;
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--text);
    text-shadow: 0 0 8px var(--pink), 0 0 22px rgba(255,32,121,0.35);
  }
  header p {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  main {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 22px 24px 48px;
    max-width: 1000px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  form { display: flex; gap: 10px; }

  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    clip-path: var(--clip);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 1px var(--cyan), 0 0 16px rgba(5,247,255,0.35);
  }

  button {
    padding: 12px 22px;
    background: var(--pink);
    border: none;
    clip-path: var(--clip);
    color: #0a0a12;
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    font-size: 13px;
    cursor: pointer;
    transition: filter .15s, box-shadow .15s;
  }
  button:hover:not(:disabled) {
    filter: brightness(1.15);
    box-shadow: 0 0 18px rgba(255,32,121,0.55);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--cyan);
    outline-offset: 2px;
  }

  #status {
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
    letter-spacing: 0.5px;
  }
  #status.error { color: var(--yellow); }
  #status .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: var(--cyan);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  #map {
    height: 360px;
    border: 1px solid var(--panel-border);
    clip-path: var(--clip);
    filter: saturate(1.1);
  }

  /* animated "data flow" dash on the traced route line */
  .leaflet-interactive.trace-route {
    stroke-dasharray: 6 8;
    animation: flow 1.2s linear infinite;
  }
  @keyframes flow { to { stroke-dashoffset: -28; } }

  #log-panel {
    border: 1px solid var(--panel-border);
    clip-path: var(--clip);
    background: var(--panel);
    display: none;
  }
  #log-header {
    display: flex;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--panel-border);
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }
  #log-header span { color: var(--cyan); }

  .hop-columns {
    display: grid;
    grid-template-columns: 54px 130px 70px 1fr 1fr;
    gap: 10px;
    padding: 8px 16px;
    font-size: 10.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--yellow);
    border-bottom: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.02);
  }
  .hop-columns .hop-rtt { text-align: right; color: var(--yellow); padding-right: 14px; }

  .hop-row {
    display: grid;
    grid-template-columns: 54px 130px 70px 1fr 1fr;
    gap: 10px;
    padding: 8px 16px;
    font-size: 12.5px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    opacity: 0;
    animation: reveal .25s ease-out forwards;
  }
  .hop-row:last-child { border-bottom: none; }
  .hop-idx { color: var(--pink); }
  .hop-ip { color: var(--text); }
  .hop-rtt { color: var(--cyan); text-align: right; padding-right: 14px; }
  .hop-loc { color: var(--muted); }
  .hop-row.timeout { color: var(--red); }
  .hop-row.timeout .signal { animation: flicker 1.4s infinite; }

  @keyframes reveal {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    45% { opacity: 1; }
    50% { opacity: 0.35; }
    55% { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    #status .cursor,
    .hop-row.timeout .signal,
    .leaflet-interactive.trace-route,
    .hop-row { animation: none !important; opacity: 1 !important; }
  }

  @media (max-width: 600px) {
    .hop-columns, .hop-row { grid-template-columns: 34px 100px 55px 1fr; }
    .hop-columns .hop-loc:last-child,
    .hop-row .hop-loc:last-child { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>NETWORK TRACER</h1>
  <p>civilian-grade route tracing // observe the path your signal takes</p>
</header>

<main>
  <form id="trace-form">
    <input type="text" id="target" placeholder="target host — e.g. example.com" required />
    <button type="submit" id="submit-btn">TRACE</button>
  </form>

  <div id="status">STANDBY<span class="cursor"></span></div>

  <div id="map"></div>

  <div id="log-panel">
    <div id="log-header"><span>// HOP LOG</span><span id="log-count"></span></div>
    <div class="hop-columns">
      <div>HOP</div>
      <div>IP ADDRESS</div>
      <div class="hop-rtt">RTT</div>
      <div>ISP</div>
      <div>LOCATION</div>
    </div>
    <div id="hops-body"></div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const form = document.getElementById('trace-form');
  const targetInput = document.getElementById('target');
  const submitBtn = document.getElementById('submit-btn');
  const statusEl = document.getElementById('status');
  const logPanel = document.getElementById('log-panel');
  const logCount = document.getElementById('log-count');
  const hopsBody = document.getElementById('hops-body');

  const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  let markers = [];
  let routeLine = null;

  function clearMap() {
    markers.forEach((m) => map.removeLayer(m));
    markers = [];
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  }

  function neonIcon(color) {
    return L.divIcon({
      className: '',
      html: `<div style="width:10px;height:10px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color},0 0 16px ${color};"></div>`,
      iconSize: [10, 10],
      iconAnchor: [5, 5],
    });
  }

  function renderMap(hops) {
    clearMap();
    const points = [];
    hops.forEach((hop) => {
      if (hop.lat == null || hop.lng == null) return;
      const marker = L.marker([hop.lat, hop.lng], { icon: neonIcon('#05f7ff') }).addTo(map);
      marker.bindPopup(
        `<b>HOP ${hop.hop}</b><br/>${hop.ip || 'unknown'}<br/>${hop.city || ''} ${hop.country || ''}<br/>${hop.isp || ''}`
      );
      markers.push(marker);
      points.push([hop.lat, hop.lng]);
    });

    if (points.length > 1) {
      routeLine = L.polyline(points, { color: '#ff2079', weight: 3, className: 'trace-route' }).addTo(map);
      map.fitBounds(routeLine.getBounds(), { padding: [30, 30] });
    } else if (points.length === 1) {
      map.setView(points[0], 6);
    }
  }

  function renderLog(hops) {
    hopsBody.innerHTML = '';
    logCount.textContent = `${hops.length} HOPS`;
    logPanel.style.display = 'block';

    hops.forEach((hop, i) => {
      const row = document.createElement('div');
      row.className = 'hop-row' + (hop.timeout ? ' timeout' : '');
      row.style.animationDelay = `${i * 45}ms`;
      const idx = String(hop.hop).padStart(2, '0');

      if (hop.timeout) {
        row.innerHTML = `
          <div class="hop-idx">//${idx}</div>
          <div class="signal" style="grid-column: span 4;">[ SIGNAL LOST ]</div>
        `;
      } else {
        const loc = [hop.city, hop.country].filter(Boolean).join(', ') || (hop.isp || '—');
        row.innerHTML = `
          <div class="hop-idx">//${idx}</div>
          <div class="hop-ip">${hop.ip || '-'}</div>
          <div class="hop-rtt">${hop.rtt != null ? hop.rtt + 'ms' : '-'}</div>
          <div class="hop-loc">${hop.isp || ''}</div>
          <div class="hop-loc">${loc}</div>
        `;
      }
      hopsBody.appendChild(row);
    });
  }

  function glitchStatus(text) {
    statusEl.classList.remove('error');
    const glitchChars = '!<>-_\\/[]{}—=+*^?#';
    let frame = 0;
    const finalText = text;
    const iv = setInterval(() => {
      frame++;
      if (frame > 6) {
        clearInterval(iv);
        statusEl.innerHTML = `${finalText}<span class="cursor"></span>`;
        return;
      }
      const scrambled = finalText
        .split('')
        .map((c) => (Math.random() > 0.6 ? glitchChars[Math.floor(Math.random() * glitchChars.length)] : c))
        .join('');
      statusEl.textContent = scrambled;
    }, 40);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const target = targetInput.value.trim();
    if (!target) return;

    submitBtn.disabled = true;
    logPanel.style.display = 'none';
    clearMap();
    glitchStatus(`TRACING ${target.toUpperCase()}...`);

    try {
      const res = await fetch('/api/trace', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'trace failed');

      glitchStatus(`TRACE COMPLETE — ${data.hops.length} HOPS TO ${data.target.toUpperCase()}`);
      renderLog(data.hops);
      renderMap(data.hops);
    } catch (err) {
      statusEl.textContent = `[ ERROR ] ${err.message}`;
      statusEl.classList.add('error');
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>

</body>
</html>
